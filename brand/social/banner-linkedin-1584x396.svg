        <path d="M 5,-40 Q 14,-55 20,-61" stroke="#B7BF99" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
        <circle cx="-20" cy="-61" r="1.8" fill="#EDAA25" opacity="0.8"/>
        <circle cx="20" cy="-61" r="1.8" fill="#EDAA25" opacity="0.8"/>
        <ellipse cx="0" cy="-34" rx="9" ry="7" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <ellipse cx="0" cy="-23" rx="14" ry="9" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <path d="M -2,-16 Q -23,-12 -23,8 Q -23,35 -5,45 L -2,45 Z" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <path d="M 2,-16 Q 23,-12 23,8 Q 23,35 5,45 L 2,45 Z" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <line x1="-12" y1="-7" x2="-12" y2="30" stroke="#0A7373" stroke-width="0.7" opacity="0.6"/>
        <line x1="12" y1="-7" x2="12" y2="30" stroke="#0A7373" stroke-width="0.7" opacity="0.6"/>
        <circle cx="-12" cy="-7" r="1.5" fill="#EDAA25" opacity="0.7"/>
        <circle cx="12" cy="-7" r="1.5" fill="#EDAA25" opacity="0.7"/>
        <circle cx="-12" cy="19" r="1.5" fill="#C43302" opacity="0.6"/>
        <circle cx="12" cy="19" r="1.5" fill="#C43302" opacity="0.6"/>
        <line x1="0" y1="-16" x2="0" y2="45" stroke="#0A7373" stroke-width="0.4" opacity="0.3"/>
      </g>
    </g>
    <circle cx="1386" cy="42" r="2" fill="#EDAA25" opacity="0.5"/>
    <circle cx="1386" cy="354" r="2" fill="#EDAA25" opacity="0.5"/>
