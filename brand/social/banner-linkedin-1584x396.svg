<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- Banner for LinkedIn — 1584x396 — Beetle Circuit -->
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="19" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply"/>
    </filter>
    <clipPath id="medal"><circle cx="1386" cy="198" r="138"/></clipPath>
    <path id="ring" d="M 1386,198 m -153,0 a 153,153 0 1,1 306,0 a 153,153 0 1,1 -306,0" fill="none"/>
  </defs>

  <rect width="1584" height="396" fill="#010221"/>
  <path d="M 0,396 L 250,300 L 400,340 L 600,270 L 800,320 L 1000,260 L 1200,300 L 1400,270 L 1584,300 L 1584,396 Z" fill="#0A7373" opacity="0.05"/>

  <!-- Name + tagline (left side — clear of profile pic overlay) -->
  <text x="120" y="190" font-family="monospace" font-size="54" font-weight="700" fill="#E8E8E0">kafkade</text>
  <text x="120" y="232" font-family="monospace" font-size="19" fill="#C43302">software, systems, and other things</text>
  <text x="120" y="265" font-family="monospace" font-size="14" fill="#B7BF99" opacity="0.5">Software Creator · Pacific Northwest</text>

  <text x="120" y="358" font-family="monospace" font-size="7" fill="#B7BF99" opacity="0.12">01001011 01010000 01001110 01010111</text>

  <!-- Beetle medallion (right side — avoids LinkedIn profile pic overlap) -->
  <g filter="url(#paper)">
    <circle cx="1386" cy="198" r="156" fill="none" stroke="#0A7373" stroke-width="1" opacity="0.3"/>
    <circle cx="1386" cy="198" r="140" fill="none" stroke="#0A7373" stroke-width="0.7" opacity="0.2"/>
    <text font-family="monospace" font-size="6" fill="#B7BF99" opacity="0.3">
      <textPath href="#ring" startOffset="0%">01001011 01100001 01100110 01101011 01100001 01100100 01100101 00101110 01010000 01001110 01010111 </textPath>
    </text>
    <g clip-path="url(#medal)">
      <rect x="1228" y="40" width="316" height="316" fill="#010221"/>
      <path d="M 1248,336 L 1288,280 L 1328,305 L 1378,255 L 1418,280 L 1458,240 L 1498,265 L 1524,250 L 1524,336 Z" fill="#0A7373" opacity="0.2"/>
      <g transform="translate(1386, 183)">
