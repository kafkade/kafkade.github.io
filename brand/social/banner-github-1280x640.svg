<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- Banner for GitHub profile README — 1280x640 — Beetle Circuit -->
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="9" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply"/>
    </filter>
    <clipPath id="medal"><circle cx="340" cy="300" r="185"/></clipPath>
    <path id="ring" d="M 340,300 m -202,0 a 202,202 0 1,1 404,0 a 202,202 0 1,1 -404,0" fill="none"/>
  </defs>

  <rect width="1280" height="640" fill="#010221"/>

  <!-- Mountain range background -->
  <path d="M 0,640 L 200,480 L 380,540 L 550,420 L 720,500 L 900,400 L 1050,470 L 1200,420 L 1280,460 L 1280,640 Z" fill="#0A7373" opacity="0.05"/>

  <!-- Beetle medallion (left-center) -->
  <g filter="url(#paper)">
    <circle cx="340" cy="300" r="208" fill="none" stroke="#0A7373" stroke-width="1.2" opacity="0.3"/>
    <circle cx="340" cy="300" r="188" fill="none" stroke="#0A7373" stroke-width="0.8" opacity="0.2"/>

    <text font-family="monospace" font-size="7.5" fill="#B7BF99" opacity="0.3">
      <textPath href="#ring" startOffset="0%">01001011 01100001 01100110 01101011 01100001 01100100 01100101 00101110 01010000 01001110 01010111 00101110 </textPath>
    </text>

    <g clip-path="url(#medal)">
      <rect x="130" y="90" width="420" height="420" fill="#010221"/>
      <path d="M 155,450 L 200,360 L 250,400 L 310,330 L 360,370 L 410,310 L 460,350 L 500,320 L 525,350 L 525,450 Z" fill="#0A7373" opacity="0.2"/>
      <polygon points="180,450 188,410 196,450" fill="#0A7373" opacity="0.25"/>
      <polygon points="480,450 488,415 496,450" fill="#0A7373" opacity="0.22"/>

      <!-- Beetle -->
      <g transform="translate(340, 275)">
        <path d="M -7,-52 Q -18,-72 -26,-80" stroke="#B7BF99" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.6"/>
        <path d="M 7,-52 Q 18,-72 26,-80" stroke="#B7BF99" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.6"/>
        <circle cx="-26" cy="-80" r="2.2" fill="#EDAA25" opacity="0.8"/>
        <circle cx="26" cy="-80" r="2.2" fill="#EDAA25" opacity="0.8"/>
        <ellipse cx="0" cy="-46" rx="12" ry="10" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.9"/>
        <ellipse cx="0" cy="-30" rx="19" ry="12" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.9"/>
        <line x1="-19" y1="-30" x2="-40" y2="-42" stroke="#B7BF99" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="19" y1="-30" x2="40" y2="-42" stroke="#B7BF99" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="-24" y1="0" x2="-44" y2="-5" stroke="#B7BF99" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="24" y1="0" x2="44" y2="-5" stroke="#B7BF99" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="-22" y1="30" x2="-42" y2="38" stroke="#B7BF99" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="22" y1="30" x2="42" y2="38" stroke="#B7BF99" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <path d="M -2,-22 Q -30,-17 -30,12 Q -30,48 -7,60 L -2,60 Z" fill="#1A1A2E" stroke="#0A7373" stroke-width="1"/>
        <path d="M 2,-22 Q 30,-17 30,12 Q 30,48 7,60 L 2,60 Z" fill="#1A1A2E" stroke="#0A7373" stroke-width="1"/>
        <line x1="-15" y1="-12" x2="-15" y2="42" stroke="#0A7373" stroke-width="0.8" opacity="0.6"/>
        <line x1="15" y1="-12" x2="15" y2="42" stroke="#0A7373" stroke-width="0.8" opacity="0.6"/>
        <line x1="-15" y1="0" x2="-24" y2="0" stroke="#0A7373" stroke-width="0.6" opacity="0.5"/>
        <line x1="15" y1="0" x2="24" y2="0" stroke="#0A7373" stroke-width="0.6" opacity="0.5"/>
        <line x1="-15" y1="18" x2="-26" y2="18" stroke="#0A7373" stroke-width="0.6" opacity="0.5"/>
        <line x1="15" y1="18" x2="26" y2="18" stroke="#0A7373" stroke-width="0.6" opacity="0.5"/>
        <circle cx="-15" cy="-12" r="1.8" fill="#EDAA25" opacity="0.7"/>
        <circle cx="15" cy="-12" r="1.8" fill="#EDAA25" opacity="0.7"/>
        <circle cx="-15" cy="28" r="1.8" fill="#C43302" opacity="0.6"/>
        <circle cx="15" cy="28" r="1.8" fill="#C43302" opacity="0.6"/>
        <line x1="0" y1="-22" x2="0" y2="60" stroke="#0A7373" stroke-width="0.5" opacity="0.3"/>
      </g>
    </g>

    <circle cx="340" cy="92" r="2.5" fill="#EDAA25" opacity="0.5"/>
    <circle cx="340" cy="508" r="2.5" fill="#EDAA25" opacity="0.5"/>
  </g>

  <!-- Name + tagline (right side) -->
  <text x="640" y="280" font-family="monospace" font-size="72" font-weight="700" fill="#E8E8E0">kafkade</text>
  <text x="640" y="340" font-family="monospace" font-size="24" fill="#C43302">software, systems, and other things</text>
  <text x="640" y="390" font-family="monospace" font-size="16" fill="#B7BF99" opacity="0.6">Software creator · Pacific Northwest</text>

  <!-- Binary accent -->
  <text x="640" y="520" font-family="monospace" font-size="8" fill="#B7BF99" opacity="0.12">01001011 01010000 01001110 01010111</text>
</svg>
