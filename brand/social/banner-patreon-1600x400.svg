<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <!-- Banner for Patreon — 1600x400 — Beetle Circuit -->
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="13" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply"/>
    </filter>
    <clipPath id="medal"><circle cx="200" cy="200" r="140"/></clipPath>
    <path id="ring" d="M 200,200 m -155,0 a 155,155 0 1,1 310,0 a 155,155 0 1,1 -310,0" fill="none"/>
  </defs>

  <rect width="1600" height="400" fill="#010221"/>
  <path d="M 0,400 L 250,300 L 400,350 L 600,270 L 800,330 L 1000,260 L 1200,310 L 1400,270 L 1600,310 L 1600,400 Z" fill="#0A7373" opacity="0.05"/>

  <!-- Beetle medallion (left) -->
  <g filter="url(#paper)">
    <circle cx="200" cy="200" r="158" fill="none" stroke="#0A7373" stroke-width="1" opacity="0.3"/>
    <circle cx="200" cy="200" r="142" fill="none" stroke="#0A7373" stroke-width="0.7" opacity="0.2"/>
    <text font-family="monospace" font-size="6" fill="#B7BF99" opacity="0.3">
      <textPath href="#ring" startOffset="0%">01001011 01100001 01100110 01101011 01100001 01100100 01100101 00101110 01010000 01001110 01010111 </textPath>
    </text>
    <g clip-path="url(#medal)">
      <rect x="40" y="40" width="320" height="320" fill="#010221"/>
      <path d="M 60,340 L 100,280 L 140,310 L 190,260 L 230,290 L 270,240 L 310,270 L 340,250 L 340,340 Z" fill="#0A7373" opacity="0.2"/>
      <g transform="translate(200, 185)">
        <path d="M -5,-40 Q -14,-56 -20,-62" stroke="#B7BF99" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
        <path d="M 5,-40 Q 14,-56 20,-62" stroke="#B7BF99" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
        <circle cx="-20" cy="-62" r="1.8" fill="#EDAA25" opacity="0.8"/>
        <circle cx="20" cy="-62" r="1.8" fill="#EDAA25" opacity="0.8"/>
        <ellipse cx="0" cy="-35" rx="9" ry="7" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <ellipse cx="0" cy="-24" rx="14" ry="9" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <path d="M -2,-17 Q -23,-13 -23,8 Q -23,36 -5,46 L -2,46 Z" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <path d="M 2,-17 Q 23,-13 23,8 Q 23,36 5,46 L 2,46 Z" fill="#1A1A2E" stroke="#0A7373" stroke-width="0.8"/>
        <line x1="-12" y1="-8" x2="-12" y2="32" stroke="#0A7373" stroke-width="0.7" opacity="0.6"/>
        <line x1="12" y1="-8" x2="12" y2="32" stroke="#0A7373" stroke-width="0.7" opacity="0.6"/>
        <circle cx="-12" cy="-8" r="1.5" fill="#EDAA25" opacity="0.7"/>
        <circle cx="12" cy="-8" r="1.5" fill="#EDAA25" opacity="0.7"/>
        <circle cx="-12" cy="20" r="1.5" fill="#C43302" opacity="0.6"/>
        <circle cx="12" cy="20" r="1.5" fill="#C43302" opacity="0.6"/>
        <line x1="0" y1="-17" x2="0" y2="46" stroke="#0A7373" stroke-width="0.4" opacity="0.3"/>
      </g>
    </g>
    <circle cx="200" cy="42" r="2" fill="#EDAA25" opacity="0.5"/>
    <circle cx="200" cy="358" r="2" fill="#EDAA25" opacity="0.5"/>
  </g>

  <!-- Name + tagline -->
  <text x="440" y="195" font-family="monospace" font-size="56" font-weight="700" fill="#E8E8E0">kafkade</text>
  <text x="440" y="238" font-family="monospace" font-size="20" fill="#C43302">software, systems, and other things</text>

  <text x="1320" y="360" font-family="monospace" font-size="7" fill="#B7BF99" opacity="0.12">01001011 01010000 01001110 01010111</text>
</svg>
