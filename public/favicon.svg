<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Beetle circuit favicon -->
  <circle cx="16" cy="16" r="15" fill="#010221"/>

  <!-- Simplified beetle silhouette -->
  <g transform="translate(16, 15)">
    <!-- Head -->
    <ellipse cx="0" cy="-7" rx="3" ry="2.5" fill="#0A7373" opacity="0.9"/>
    <!-- Antennae -->
    <line x1="-2" y1="-9" x2="-5" y2="-12" stroke="#B7BF99" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <line x1="2" y1="-9" x2="5" y2="-12" stroke="#B7BF99" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    <circle cx="-5" cy="-12" r="0.8" fill="#EDAA25" opacity="0.9"/>
    <circle cx="5" cy="-12" r="0.8" fill="#EDAA25" opacity="0.9"/>
    <!-- Left wing -->
    <path d="M -1,-4 Q -7,-2 -7,4 Q -7,9 -2,11 L -1,11 Z" fill="#0A7373" opacity="0.7"/>
    <!-- Right wing -->
    <path d="M 1,-4 Q 7,-2 7,4 Q 7,9 2,11 L 1,11 Z" fill="#0A7373" opacity="0.7"/>
    <!-- Circuit traces (simplified) -->
    <line x1="-4" y1="0" x2="-4" y2="8" stroke="#EDAA25" stroke-width="0.6" opacity="0.8"/>
    <line x1="4" y1="0" x2="4" y2="8" stroke="#EDAA25" stroke-width="0.6" opacity="0.8"/>
    <!-- Center seam -->
    <line x1="0" y1="-4" x2="0" y2="11" stroke="#010221" stroke-width="0.5" opacity="0.6"/>
    <!-- Circuit nodes -->
    <circle cx="-4" cy="0" r="0.7" fill="#C43302" opacity="0.9"/>
    <circle cx="4" cy="0" r="0.7" fill="#C43302" opacity="0.9"/>
    <circle cx="-4" cy="5" r="0.7" fill="#EDAA25" opacity="0.8"/>
    <circle cx="4" cy="5" r="0.7" fill="#EDAA25" opacity="0.8"/>
  </g>
</svg>
